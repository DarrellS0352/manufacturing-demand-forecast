name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
        - name: Checkout code
          uses: actions/checkout@v3
          
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: '3.11'
            
        - name: Install dependencies
          run: pip install lightgbm pandas numpy scikit-learn intermittent-forecast pytest
        
        - name: Run tests
          run: pytest tests/